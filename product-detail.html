<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết sản phẩm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --red: #ef2b1d;
      --red-strong: #ff1622;
      --orange: #f7a12a;
      --blue: #263f88;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #f3f4f6;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .top-bar {
      background: #fff;
      border-top: 10px solid #000;
      border-bottom: 1px solid var(--line);
    }

    .top-inner {
      max-width: 1600px;
      margin: 0 auto;
      min-height: 38px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .menu-title {
      color: var(--red);
      font-weight: 800;
      font-size: 16px;
      white-space: nowrap;
    }

    .hotline-box {
      position: relative;
      background: var(--red);
      color: #fff;
      font-weight: 800;
      padding: 8px 28px 8px 42px;
      min-width: 300px;
      text-align: center;
      font-size: 16px;
    }

    .hotline-box::before {
      content: "";
      position: absolute;
      left: -32px;
      top: 0;
      width: 0;
      height: 0;
      border-top: 19px solid transparent;
      border-bottom: 19px solid transparent;
      border-right: 32px solid var(--red);
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 14px 18px 28px;
    }

    .breadcrumb {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 12px;
    }

    .breadcrumb a:hover {
      color: var(--red);
    }

    .product-box {
      background: #fff;
      padding: 14px 14px 18px;
    }

    .product-title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.35;
      margin: 4px 0 10px;
      color: #1f2937;
    }

    .meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      font-size: 13px;
      color: #9ca3af;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .stars {
      color: #d1d5db;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .meta strong {
      color: #ef4444;
      font-weight: 700;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 640px 1fr;
      gap: 34px;
      align-items: start;
    }

    .left-col {
      min-width: 0;
    }

    .image-top-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .warranty-badge {
      width: 88px;
      min-width: 88px;
      height: 88px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fcd34d, #b91c1c 68%);
      color: #fff7cc;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      line-height: 1.05;
      font-size: 12px;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.25);
      padding: 8px;
    }

    .main-image-wrap {
      flex: 1;
      min-width: 0;
    }

    .main-image {
      width: 100%;
      max-width: 520px;
      display: block;
      margin: 0 auto;
      object-fit: contain;
    }

    .logo-row {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .logo-pill {
      height: 54px;
      min-width: 72px;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #374151;
      border-radius: 4px;
      text-align: center;
      font-size: 12px;
      line-height: 1.1;
    }

    .zoom-text {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      color: #374151;
    }

    .right-col {
      min-width: 0;
      padding-top: 6px;
    }

    .section-heading {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 18px;
      color: #1f2937;
    }

    .highlight-text {
      font-size: 15px;
      line-height: 1.75;
      color: #1f2937;
      margin-bottom: 18px;
      white-space: pre-line;
    }

    .warranty-text {
      font-size: 15px;
      margin-bottom: 18px;
      color: #9ca3af;
    }

    .warranty-text span {
      color: #ef4444;
    }

    .price-panel {
      background: #f5f5f5;
      padding: 22px 24px;
      border-radius: 4px;
      margin-bottom: 14px;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .price-label {
      font-size: 15px;
      color: #1f2937;
      min-width: 120px;
    }

    .price-value {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
    }

    .vat-text {
      font-size: 14px;
      color: #374151;
    }

    .buy-now-btn,
    .cart-btn,
    .installment-btn {
      border: none;
      width: 100%;
      cursor: pointer;
      border-radius: 4px;
      color: #fff;
      font-weight: 800;
      font-family: inherit;
    }

    .buy-now-btn {
      background: var(--red-strong);
      padding: 13px 16px 10px;
      margin-bottom: 10px;
    }

    .buy-now-btn .big {
      display: block;
      font-size: 20px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .buy-now-btn .small {
      display: block;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }

    .bottom-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .cart-btn {
      background: var(--orange);
      padding: 13px 12px 10px;
    }

    .installment-btn {
      background: var(--blue);
      padding: 13px 12px 10px;
    }

    .cart-btn .big,
    .installment-btn .big {
      display: block;
      font-size: 18px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .cart-btn .small,
    .installment-btn .small {
      display: block;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }

    .error-box,
    .loading-box {
      background: #fff;
      padding: 30px;
      text-align: center;
      font-size: 18px;
      border: 1px solid var(--line);
    }

    @media (max-width: 1200px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .top-inner {
        flex-direction: column;
        align-items: stretch;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .hotline-box {
        min-width: auto;
      }

      .detail-grid {
        gap: 20px;
      }

      .image-top-row {
        flex-direction: column;
        align-items: center;
      }

      .bottom-actions {
        grid-template-columns: 1fr;
      }

      .product-title {
        font-size: 20px;
      }

      .price-value {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="top-inner">
      <div class="menu-title">☰ DANH MỤC SẢN PHẨM</div>
      <div class="hotline-box">HOTLINE: 033.457.7086</div>
    </div>
  </div>

  <div class="page">
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Trang chủ</a> ›
      <a href="#">Linh Kiện Máy Tính</a> ›
      <span>Đang tải...</span>
    </div>

    <div id="productContent" class="loading-box">Đang tải sản phẩm...</div>
  </div>

  <script>
    function formatPrice(value) {
      return Number(value || 0).toLocaleString("vi-VN") + " đ";
    }

    function buildDescription(product) {
      if (product.description && product.description.trim()) {
        return product.description;
      }

      return `${product.name} là sản phẩm phù hợp cho nhu cầu build PC, gaming và làm việc. Thiết kế hiện đại, hiệu năng ổn định và tương thích tốt với nhiều cấu hình phổ biến hiện nay.`;
    }

    function buildSpecs(product) {
      const name = product.name || "";
      const lower = name.toLowerCase();

      if (lower.includes("mainboard") || lower.includes("b550")) {
        return {
          warranty: "36 Tháng",
          category: "Mainboard",
          sku: "SP005272",
          views: "550"
        };
      }

      if (lower.includes("case")) {
        return {
          warranty: "24 Tháng",
          category: "Vỏ case",
          sku: "SP008888",
          views: "420"
        };
      }

      return {
        warranty: "12 Tháng",
        category: "Linh Kiện Máy Tính",
        sku: "SP000001",
        views: "300"
      };
    }

    function createLogoRowHtml() {
      return `
        <div class="logo-row">
          <div class="logo-pill">AMD<br>READY</div>
          <div class="logo-pill">RYZEN</div>
          <div class="logo-pill">PCIe<br>4.0</div>
          <div class="logo-pill">Wi-Fi 6</div>
          <div class="logo-pill">AURA<br>SYNC</div>
        </div>
        <div class="zoom-text">🖵 Click xem album ảnh lớn</div>
      `;
    }

    function renderProduct(product) {
      const specs = buildSpecs(product);
      const desc = buildDescription(product);

      document.title = product.name || "Chi tiết sản phẩm";

      document.getElementById("breadcrumb").innerHTML = `
        <a href="index.html">Trang chủ</a> ›
        <a href="#">${specs.category}</a> ›
        <span>${product.name}</span>
      `;

      document.getElementById("productContent").className = "product-box";
      document.getElementById("productContent").innerHTML = `
        <h1 class="product-title">${product.name}</h1>

        <div class="meta">
          <span class="stars">★★★★★</span>
          <span>(0 lượt đánh giá)</span>
          <span>Mã hàng: ${specs.sku}</span>
          <span>Lượt xem: <strong style="color:#6b7280">${specs.views}</strong></span>
          <span>Tình trạng hàng: <strong>Liên hệ</strong></span>
        </div>

        <div class="detail-grid">
          <div class="left-col">
            <div class="image-top-row">
              <div class="warranty-badge">3<br>Năm<br>Bảo Hành</div>

              <div class="main-image-wrap">
                <img class="main-image" src="${product.image}" alt="${product.name}">
              </div>
            </div>

            ${createLogoRowHtml()}
          </div>

          <div class="right-col">
            <h2 class="section-heading">Đặc điểm nổi bật:</h2>

            <div class="highlight-text">${desc}</div>

            <div class="warranty-text">Bảo hành: <span>${specs.warranty}</span></div>

            <div class="price-panel">
              <div class="price-row">
                <div class="price-label">Giá khuyến mãi:</div>
                <div class="price-value">${formatPrice(product.price)}</div>
                <div class="vat-text">[Giá đã có VAT]</div>
              </div>
            </div>

            <button class="buy-now-btn" type="button">
              <span class="big">ĐẶT MUA NGAY</span>
              <span class="small">Giao hàng tận nơi nhanh chóng</span>
            </button>

            <div class="bottom-actions">
              <button class="cart-btn" type="button" onclick="addToCart()">
                <span class="big">THÊM VÀO GIỎ HÀNG</span>
                <span class="small">Thêm vào giỏ hàng để chọn tiếp</span>
              </button>

              <button class="installment-btn" type="button">
                <span class="big">MUA TRẢ GÓP</span>
                <span class="small">Lãi suất 0%</span>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    async function loadProductDetail() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      if (!slug) {
        document.getElementById("productContent").className = "error-box";
        document.getElementById("productContent").innerHTML = "Không có mã sản phẩm.";
        return;
      }

      try {
        const res = await fetch(`http://localhost:3000/api/products/${slug}`);
        if (!res.ok) {
          throw new Error("Không tìm thấy sản phẩm");
        }

        const product = await res.json();
        window.currentProduct = product;
        renderProduct(product);
      } catch (error) {
        console.error(error);
        document.getElementById("productContent").className = "error-box";
        document.getElementById("productContent").innerHTML = "Không tải được thông tin sản phẩm.";
      }
    }

    function addToCart() {
      if (!window.currentProduct) return;

      alert("Đã thêm vào giỏ hàng: " + window.currentProduct.name);
    }

    loadProductDetail();
  </script>
</body>
</html>
